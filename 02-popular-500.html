<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ 畅销包 - 500首精选</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0f;
    color: #e0e0e8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-animation {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255, 0, 110, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0, 245, 255, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(170, 0, 255, 0.04) 0%, transparent 60%),
      #0a0a0f;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse { 0%{opacity:.7} 100%{opacity:1} }

  /* ===== 微信二维码悬浮卡片 ===== */
  .wechat-float {
    position: fixed;
    top: 30px;
    right: 20px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: floatBounce 3s ease-in-out infinite;
  }
  @keyframes floatBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .wechat-card {
    background: linear-gradient(145deg, rgba(18, 18, 26, 0.95), rgba(10, 10, 15, 0.98));
    border: 1.5px solid rgba(255, 0, 110, 0.5);
    border-radius: 14px;
    padding: 12px;
    box-shadow:
      0 0 20px rgba(255, 0, 110, 0.2),
      0 8px 32px rgba(0, 0, 0, 0.5);
    text-align: center;
    position: relative;
    overflow: visible;
  }

  /* 霓虹边框动画 */
  .wechat-card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 15px;
    background: linear-gradient(45deg, #ff006e, #00f5ff, #aa00ff, #ff006e);
    background-size: 300% 300%;
    z-index: -1;
    opacity: 0.4;
    animation: neonBorder 4s linear infinite;
  }
  @keyframes neonBorder {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .qr-placeholder {
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #1a1a2e, #12121a);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    border: 1px dashed rgba(0, 245, 255, 0.3);
    overflow: hidden;
  }

  .qr-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }

  .qr-text {
    font-size: 11px;
    color: #00f5ff;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .qr-subtext {
    font-size: 9px;
    color: #666680;
    letter-spacing: 0.5px;
  }

  .qr-tip-row {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; margin-top: 6px;
  }

  /* 手指从左往右指向二维码 */
  .pointing-hand {
    font-size: 22px;
    display: inline-block;
    animation: pointRightLeft 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(255, 0, 110, 0.7));
  }
  @keyframes pointRightLeft {
    0%   { transform: translateX(-12px) rotate(-25deg); opacity: 0.5; }
    35%  { transform: translateX(6px) rotate(-8deg); opacity: 1; text-shadow: 0 0 10px rgba(255,0,110,.5); }
    50%  { transform: translateX(14px) rotate(0deg); opacity: 1; }
    65%  { transform: translateX(6px) rotate(-8deg); opacity: 1; }
    100% { transform: translateX(-12px) rotate(-25deg); opacity: 0.5; }
  }

  /* 移动端适配 */
  @media (max-width: 768px) {
    .wechat-float {
      top: auto;
      bottom: 20px;
      right: 12px;
    }
    .wechat-card { padding: 8px; }
    .qr-placeholder { width: 85px; height: 85px; }
    .qr-text { font-size: 9px; }
  .qr-tip-row {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; margin-top: 6px;
  }
    .qr-subtext { font-size: 8px; }
    .pointing-hand { font-size: 19px; }
  }

  /* ===== 头部区域 ===== */
  .header { text-align: center; padding: 60px 20px 40px; position: relative; }
  
  .neon-border {
    position: absolute;
    top: 20px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 600px;
    height: calc(100% - 40px);
    border: 2px solid #ff006e;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(255,0,110,.3), inset 0 0 10px rgba(255,0,110,.1);
    z-index: 0;
  }
  .neon-border::before {
    content: ''; position: absolute;
    top:6px;left:6px;right:6px;bottom:6px;
    border:1px solid #00f5ff; border-radius:2px; opacity:.5;
  }
  
  .header-content { position: relative; z-index: 1; }
  
  .badge {
    display: inline-block;
    background: linear-gradient(135deg,#ff006e,#aa00ff);
    color:white; padding:6px 20px; border-radius:20px;
    font-size:14px; font-weight:700; letter-spacing:2px; margin-bottom:16px;
    animation: badgeGlow 2s ease-in-out infinite alternate;
  }
  @keyframes badgeGlow {
    0%{box-shadow:0 0 10px rgba(255,0,110,.4)}
    100%{box-shadow:0 0 25px rgba(170,0,255,.6)}
  }

  .main-title {
    font-size: clamp(36px,8vw,64px); font-weight:900;
    background: linear-gradient(135deg,#fff,#00f5ff,#ff006e);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    line-height:1.2; margin-bottom:12px;
  }
  .subtitle {
    font-size: clamp(18px,4vw,28px); color:#00f5ff; font-weight:700; letter-spacing:3px;
  }
  .tagline { font-size:13px; color:#666680; letter-spacing:4px; margin-top:10px; }
  
  .divider {
    display:flex; align-items:center; justify-content:center; gap:12px;
    margin:30px auto; max-width:300px;
  }
  .divider span { height:1px; flex:1; background:linear-gradient(90deg,transparent,#333344,transparent); }
  .divider i { color:#aa00ff; font-style:normal; font-size:20px; animation:spin 3s linear infinite; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .stats-bar { display:flex; justify-content:center; gap:30px; padding:20px; flex-wrap:wrap; }
  .stat-item {
    text-align:center; padding:15px 25px;
    background:rgba(255,255,255,.03); border:1px solid rgba(255,0,110,.2);
    border-radius:8px; min-width:120px;
  }
  .stat-num { font-size:32px; font-weight:900; color:#ff006e; text-shadow:0 0 20px rgba(255,0,110,.5); }
  .stat-label { font-size:12px; color:#888; margin-top:4px; letter-spacing:1px; }

  .search-box { max-width:500px; margin:20px auto 30px; position:relative; }
  .search-box input {
    width:100%; padding:14px 24px 14px 48px;
    background:rgba(255,255,255,.05); border:1px solid rgba(0,245,255,.2);
    border-radius:30px; color:#e0e0e8; font-size:15px; font-family:inherit;
    outline:none; transition:all .3s;
  }
  .search-box input:focus { border-color:#00f5ff; box-shadow:0 0 20px rgba(0,245,255,.15); }
  .search-box input::placeholder { color:#555; }
  .search-icon { position:absolute; left:18px;top:50%; transform:translateY(-50%); color:#00f5ff; font-size:18px; }

  .song-list { max-width:700px; margin:0 auto; padding:0 16px 60px; }
  
  .song-item {
    display:flex; align-items:center; padding:14px 18px; margin-bottom:6px;
    background:rgba(255,255,255,.02); border:1px solid transparent; border-radius:10px;
    transition:all .3s; cursor:pointer;
    animation:fadeInUp .4s ease backwards;
  }
  .song-item:hover {
    background:rgba(255,0,110,.08); border-color:rgba(255,0,110,.2); transform:translateX(8px);
  }
  .song-item:nth-child(even){background:rgba(255,255,255,.04)}
  .song-item:nth-child(even):hover{background:rgba(255,0,110,.1)}
  @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .song-num { min-width:38px; font-size:18px; font-weight:900; color:#ff006e; text-shadow:0 0 8px rgba(255,0,110,.4); text-align:center; }
  .song-divider { color:#333344; margin:0 12px; font-weight:bold; }
  .song-name { flex:1; font-size:15px; color:#e0e0e8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .song-play { opacity:0; color:#00f5ff; font-size:20px; margin-left:12px; transition:opacity .3s; }
  .song-item:hover .song-play { opacity:1; }

  .footer-cta { text-align:center; padding:50px 20px; margin-top:30px; background:linear-gradient(to top, rgba(255,0,110,.05), transparent); }
  .cta-btn {
    display:inline-block; padding:16px 48px;
    background:linear-gradient(135deg,#ff006e,#aa00ff); color:white;
    font-size:18px; font-weight:700; border:none; border-radius:30px;
    cursor:pointer; letter-spacing:2px; text-decoration:none;
    box-shadow:0 4px 30px rgba(255,0,110,.4); transition:all .3s;
    animation:ctaPulse 2s ease-in-out infinite;
  }
  .cta-btn:hover { transform:translateY(-3px); box-shadow:0 8px 40px rgba(255,0,110,.6); }
  @keyframes ctaPulse {
    0%,100%{box-shadow:0 4px 30px rgba(255,0,110,.4)}
    50%{box-shadow:0 4px 45px rgba(170,0,255,.5)}
  }
  .footer-text { margin-top:20px; font-size:13px; color:#555; letter-spacing:2px; }

  @media (max-width:600px) {
    .stats-bar{gap:15px} .stat-item{min-width:90px;padding:10px 15px}
    .stat-num{font-size:24px} .song-item{padding:12px 14px}
    .song-num{min-width:32px;font-size:15px} .song-name{font-size:13px}
  }
</style>
</head>

function renderSongs(filter = '') {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  const filtered = songs.filter(s => s[1].toLowerCase().includes(filter.toLowerCase()));
  filtered.forEach((song, idx) => {
    const div = document.createElement('div');
    div.className = 'song-item';
    div.style.animationDelay = (idx * 0.02) + 's';
    div.innerHTML = '<span class="song-num">' + String(song[0]).padStart(2,'0') + '</span>' +
      '<span class="song-divider">│</span>' +
      '<span class="song-name">' + song[1] + '</span>' +
      '<span class="song-play">▶</span>';
    list.appendChild(div);
  });
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  renderSongs(e.target.value);
});
